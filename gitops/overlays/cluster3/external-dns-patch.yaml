apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  template:
    spec:
      containers:
        - name: external-dns
          args:
            - --source=service
            - --provider=aws
            - --aws-zone-type=public
            - --registry=txt
            - --txt-owner-id=cluster3-mongodb
            - --domain-filter=CLUSTER3_DOMAIN.example.com
            - --log-level=info
            - --interval=10s
            - --policy=upsert-only
