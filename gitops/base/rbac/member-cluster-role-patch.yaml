apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-kubernetes-operator-multi-role-extra
  namespace: mongodb-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["mongodb.com"]
    resources:
      - mongodbmulticluster
      - mongodbmulticluster/finalizers
      - mongodbmulticluster/status
      - mongodb
      - mongodb/finalizers
      - mongodb/status
      - opsmanagers
      - opsmanagers/finalizers
      - opsmanagers/status
      - mongodbusers
      - mongodbusers/status
      - mongodbsearch
      - mongodbsearch/finalizers
      - mongodbsearch/status
    verbs: ["*"]
  - apiGroups: ["mongodbcommunity.mongodb.com"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-kubernetes-operator-multi-role-extra
  namespace: mongodb-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mongodb-kubernetes-operator-multi-role-extra
subjects:
  - kind: ServiceAccount
    name: mongodb-kubernetes-operator-multi-cluster
    namespace: mongodb-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-kubernetes-operator-multi-role-extra
  namespace: mongodb-ops-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["mongodb.com"]
    resources:
      - mongodbmulticluster
      - mongodbmulticluster/finalizers
      - mongodbmulticluster/status
      - mongodb
      - mongodb/finalizers
      - mongodb/status
      - opsmanagers
      - opsmanagers/finalizers
      - opsmanagers/status
      - mongodbusers
      - mongodbusers/status
      - mongodbsearch
      - mongodbsearch/finalizers
      - mongodbsearch/status
    verbs: ["*"]
  - apiGroups: ["mongodbcommunity.mongodb.com"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-kubernetes-operator-multi-role-extra
  namespace: mongodb-ops-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mongodb-kubernetes-operator-multi-role-extra
subjects:
  - kind: ServiceAccount
    name: mongodb-kubernetes-operator-multi-cluster
    namespace: mongodb-operator
